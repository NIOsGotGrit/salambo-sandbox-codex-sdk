#:schema https://developers.openai.com/codex/config-schema.json

# ── Default profile ──
# Active when configProfile = "default" in harness-config/agent.ts
[profiles.default]
model = "gpt-5.2-codex"
model_reasoning_summary = "detailed"
approval_policy = "never"
sandbox_mode = "workspace-write"

# ── Heavy reasoning profile ──
# Active when configProfile = "heavy-reasoning"
[profiles.heavy-reasoning]
model = "o3-pro"
model_reasoning_summary = "detailed"
approval_policy = "never"
sandbox_mode = "danger-full-access"

# ── Fast iteration profile ──
# Active when configProfile = "fast"
[profiles.fast]
model = "codex-mini"
model_reasoning_summary = "concise"
approval_policy = "never"
sandbox_mode = "workspace-write"
